var S={streak:0,lastDay:'',done:[],words:[]};

function save(){try{localStorage.setItem('baza',JSON.stringify(S));}catch(e){}}
function today(){return new Date().toISOString().split('T')[0];}
function go(id){var p=document.querySelectorAll('.page');for(var i=0;i<p.length;i++)p[i].classList.remove('active');document.getElementById(id).classList.add('active');}
function setNav(n){for(var i=0;i<3;i++){var b=document.getElementById('nav'+i);if(b){b.style.color=i===n?'#2563eb':'#64748b';b.style.fontWeight=i===n?'700':'normal';}}}
function hesc(s){return String(s).replace(/&/g,'&').replace(/</g,'<').replace(/>/g,'>');}

function renderHome(){
  var t=today();
  if(S.lastDay!==t){var y=new Date(Date.now()-86400000).toISOString().split('T')[0];S.streak=S.lastDay===y?S.streak+1:1;S.lastDay=t;save();}
  document.getElementById('streakNum').textContent=S.streak;
  document.getElementById('streakBox').style.display=S.streak>0?'inline':'none';
  document.getElementById('wordsNum').textContent=S.words.length;
  document.getElementById('lessonsNum').textContent=S.done.length;
  var pct=L.length>0?Math.round(S.done.length/L.length*100):0;
  document.getElementById('progText').textContent=S.done.length+' / '+L.length+' dars';
  document.getElementById('progBar').style.width=pct+'%';
  var next=null;for(var i=0;i<L.length;i++){if(S.done.indexOf(L[i].id)===-1){next=L[i];break;}}
  var w=document.getElementById('ctaWrap');
  if(next){w.innerHTML='<button id="ctaBtn" style="width:100%;background:#2563eb;color:#fff;border:none;border-radius:20px;padding:22px;font-size:19px;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(37,99,235,.35)">📚 Darsni boshlash: '+hesc(next.t)+'</button>';document.getElementById('ctaBtn').onclick=function(){startLesson(next.id);};}
  else{w.innerHTML='<button style="width:100%;background:#94a3b8;color:#fff;border:none;border-radius:20px;padding:22px;font-size:19px;font-weight:700;cursor:pointer">🏆 Barcha darslar tugatildi!</button>';}
  var h='';for(var i=0;i<Math.min(5,L.length);i++){var l=L[i];var d=S.done.indexOf(l.id)!==-1;h+='<div class="lesson-card" data-id="'+l.id+'" style="background:#fff;border-radius:20px;padding:16px;border:1px solid #e2e8f0;display:flex;align-items:center;gap:14px;cursor:pointer;margin-bottom:10px"><div style="width:44px;height:44px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;background:'+(d?'#dcfce7':'#dbeafe')+'">'+(d?'✅':l.id)+'</div><div style="flex:1"><p style="font-size:15px;font-weight:600">'+hesc(l.t)+'</p><p style="font-size:13px;color:#64748b">'+hesc(l.cat)+' · '+l.p.length+" so'z</p></div><span style='color:#94a3b8;font-size:18px'>›</span></div>";}
  if(L.length>5)h+='<div id="viewAllBtn" style="text-align:center;color:#2563eb;font-weight:600;padding:12px;cursor:pointer">Barcha '+L.length+" darsni ko'rish →</div>";
  document.getElementById('homeList').innerHTML=h;
  var cards=document.querySelectorAll('.lesson-card');for(var i=0;i<cards.length;i++){cards[i].onclick=(function(id){return function(){startLesson(id);};})(parseInt(cards[i].dataset.id));}
  var vab=document.getElementById('viewAllBtn');if(vab)vab.onclick=function(){go('lessons');renderList();setNav(1);};
}

function renderList(){

  if(q){var f=[];for(var i=0;i<items.length;i++){if((items[i].t+' '+items[i].tr+' '+items[i].cat).toLowerCase().indexOf(q)!==-1)f.push(items[i]);}items=f;}

var curL=null,curIdx=0,ok=0,bad=0;
function startLesson(id){curL=null;for(var i=0;i<L.length;i++){if(L[i].id===id){curL=L[i];break;}}if(!curL)return;curIdx=0;ok=0;bad=0;go('lesson');showWord();}

function showWord(){
  if(!curL||curIdx>=curL.p.length)return;
  var p=curL.p[curIdx];
  document.getElementById('lTitle').textContent=curL.t;
  document.getElementById('lStep').textContent=(curIdx+1)+'/'+curL.p.length;
  document.getElementById('lBar').style.width=((curIdx+1)/curL.p.length*100)+'%';
  var c=document.getElementById('content');
  var h='<div style="background:#fff;border-radius:20px;padding:28px 20px;border:1px solid #e2e8f0;text-align:center;margin-bottom:16px">';
  h+='<p style="font-size:28px;font-weight:700;line-height:1.3;margin-bottom:12px">'+hesc(p.ru)+'</p>';

  h+='<p style="font-size:13px;color:#94a3b8;margin-top:8px;font-style:italic">💬 '+hesc(p.ctx)+'</p>';
  h+='<div style="background:#f5f3ff;border-radius:12px;padding:12px;margin-top:12px;text-align:left;font-size:13px;color:#7c3aed">📝 <b>Grammatika:</b> '+hesc(p.gr)+'</div></div>';
  h+='<div style="background:#fff;border-radius:16px;padding:16px;border:1px solid #e2e8f0;margin-bottom:12px">';
  h+='<p style="font-size:12px;font-weight:600;color:#475569;margin-bottom:8px">🇷🇺 Ruscha yozing:</p>';
  h+='<input id="wordInput" placeholder="Ruscha yozing..." autocomplete="off" spellcheck="false" style="width:100%;padding:16px;border:2px solid #e2e8f0;border-radius:14px;font-size:22px;font-weight:600;text-align:center;outline:none"></div>';
  h+='<div id="resultArea"></div>';
  h+='<button id="checkBtn" style="width:100%;background:#2563eb;color:#fff;border:none;border-radius:16px;padding:22px;font-size:20px;font-weight:800;cursor:pointer;display:block">✅ Tekshirish</button>';
  c.innerHTML=h;
  document.getElementById('checkBtn').addEventListener('click',doCheck);

function lev(a,b){var m=a.length,n=b.length,dp=[];for(var i=0;i<=m;i++){dp[i]=[i];}for(var j=0;j<=n;j++){dp[0][j]=j;}for(var i=1;i<=m;i++){for(var j=1;j<=n;j++){dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);}}return dp[m][n];}
function scoreAns(a,b){try{var na=a.toLowerCase().replace(/[^a-z0-9Ѐ-ӿs]/g,'').trim();var nb=b.toLowerCase().replace(/[^a-z0-9Ѐ-ӿs]/g,'').trim();if(na===nb)return 100;if(!na||!nb)return 0;var d=lev(na,nb),mx=Math.max(na.length,nb.length);return Math.round(((mx-d)/mx)*100);}catch(e){return 0;}}

function doCheck(){
  if(!curL||curIdx>=curL.p.length)return;
  var p=curL.p[curIdx];var inp=document.getElementById('wordInput');if(!inp)return;
  var val=inp.value.trim();if(!val){inp.style.borderColor='#ef4444';inp.focus();return;}
  var s=scoreAns(p.ru,val);var pass=s>=60;
  inp.disabled=true;inp.style.borderColor=pass?'#22c55e':'#ef4444';inp.style.background=pass?'#f0fdf4':'#fef2f2';
  if(pass){ok++;recWord(p,true);}else{bad++;recWord(p,false);}
  var isLast=curIdx>=curL.p.length-1;
  var r='<div style="border-radius:16px;padding:20px;text-align:center;border:2px solid;margin-top:12px;'+(pass?'background:#f0fdf4;border-color:#86efac':'background:#fef2f2;border-color:#fca5a5')+'">';
  r+='<p style="font-size:40px;margin-bottom:4px">'+(pass?'🎉':'🔄')+'</p>';
  r+='<p style="font-size:18px;font-weight:700;color:'+(pass?'#166534':'#991b1b')+'">'+(pass?"To'g'ri! "+s+"%":"Xato ("+s+"%)")+'</p>';
  if(!pass){r+='<div style="background:#fff;border-radius:12px;padding:10px;margin-top:8px;text-align:left;font-size:13px"><p style="color:#64748b">Siz: <b>'+hesc(val)+'</b></p><p style="color:#64748b;margin-top:4px">To\'g\'ri: <b style="color:#166534">'+hesc(p.ru)+'</b></p></div>';}
  r+='</div>';
  r+='<button id="nextBtn" style="width:100%;background:#16a34a;color:#fff;border:none;border-radius:16px;padding:24px;font-size:20px;font-weight:800;cursor:pointer;margin-top:16px;display:block">'+(isLast?'🏆 Darsni tugatish':"➡️ Keyingi so'z")+'</button>';
  r+='<button id="skipBtn" style="width:100%;background:none;color:#64748b;border:2px solid #e2e8f0;border-radius:14px;padding:14px;font-size:14px;cursor:pointer;margin-top:8px;display:block">⏭️ O\'tkazib yuborish</button>';
  document.getElementById('resultArea').innerHTML=r;
  document.getElementById('checkBtn').style.display='none';
  document.getElementById('nextBtn').addEventListener('click',function(){if(isLast)finishLesson();else{curIdx++;showWord();}});
  document.getElementById('skipBtn').addEventListener('click',function(){curIdx++;showWord();});
  setTimeout(function(){var el=document.getElementById('resultArea');if(el)el.scrollIntoView({behavior:'smooth',block:'center'});},100);
}

function recWord(p,correct){var found=false,nw=[];for(var i=0;i<S.words.length;i++){var w=S.words[i];if(w.id===p.id){found=true;nw.push({id:w.id,ru:w.ru,uz:w.uz,a:w.a+1,c:w.c+(correct?1:0)});}else{nw.push(w);}}if(!found)nw.push({id:p.id,ru:p.ru,uz:p.uz,a:1,c:correct?1:0});S.words=nw;save();}

function finishLesson(){if(S.done.indexOf(curL.id)===-1)S.done.push(curL.id);save();document.getElementById('doneName').textContent=curL.t;document.getElementById('doneOk').textContent=ok;document.getElementById('doneBad').textContent=bad;document.getElementById('donePct').textContent=Math.round(ok/curL.p.length*100)+'%';go('done');}

// Bind navigation
document.getElementById('nav0').onclick=function(){go('home');renderHome();setNav(0);};
document.getElementById('nav1').onclick=function(){go('lessons');renderList();setNav(1);};
document.getElementById('nav2').onclick=function(){go('home');setNav(0);};
document.getElementById('backFromList').onclick=function(){go('home');renderHome();setNav(0);};
document.getElementById('backFromLesson').onclick=function(){go('home');renderHome();setNav(0);};
document.getElementById('backHome').onclick=function(){go('home');renderHome();setNav(0);};
document.getElementById('searchBox').oninput=function(){renderList();};

var dbg = document.getElementById('dataCheck');
try {
  if(typeof L === 'undefined') { if(dbg) dbg.textContent = 'L: undefined'; }
  else if(!L) { if(dbg) dbg.textContent = 'L: null'; }
  else if(!L.length) { if(dbg) dbg.textContent = 'L: empty'; }
  else {
    if(dbg) dbg.textContent = L.length + ' dars yuklandi!';
    renderHome();
    setTimeout(function(){ document.getElementById('loadingMsg').style.display = 'none'; }, 800);
  }
} catch(e) {
  if(dbg) { dbg.textContent = 'XATOLIK: ' + e.message; dbg.style.color = '#dc2626'; }
}
</script>
